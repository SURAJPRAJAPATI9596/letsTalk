<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

<link rel="stylesheet" href="https://unpkg.com/@coreui/icons/css/brand.min.css">

      rel="stylesheet"
    />

      rel="stylesheet"

    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        background: linear-gradient(-45deg, #0f2027, #203a43, #1f4037, #2c5364);
        background-size: 400% 400%;
        animation: bgMove 15s ease infinite;
      }

      @keyframes bgMove {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      /* Floating Bubbles */
      .bubble {
        position: absolute;
        bottom: -100px;
        background: rgba(0, 255, 150, 0.15);
        border-radius: 50%;
        animation: rise linear infinite;
      }

      @keyframes rise {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(-120vh);
        }
      }

      .container {
        width: 100%;
        max-width: 420px;
        padding: 40px 20px;
        text-align: center;
        color: #fff;
        position: relative;
        z-index: 2;
      }

      /* Profile Glow */
      .profile-wrapper {
        position: relative;
        display: inline-block;
        margin-bottom: 10px;
      }

      .profile-wrapper::before {
        content: "";
        position: absolute;
        inset: -10px;
        border-radius: 50%;
        background: #00ff99;
        filter: blur(20px);
        opacity: 0.7;
        animation: glow 3s ease-in-out infinite;
        z-index: -1;
      }

      @keyframes glow {
        0%,
        100% {
          opacity: 0.5;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.15);
        }
      }

      .profile-img {
        width: 115px;
        height: 115px;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid rgba(255, 255, 255, 0.3);
      }

      /* Name & Bio */
      h1 {
        margin-top: 10px;
        font-size: 22px;
      }

      .bio {
        font-size: 14px;
        opacity: 0.85;
        margin: 8px 0 20px;
      }

      /* Header Social Icons */
      .header-icons {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 10%;
      }

      .header-icons a {
        color: white;
        transition: 0.3s;
        font-size: 1.5rem;
      }

      .header-icons a:hover {
        color: #00ff99;
        transform: scale(1.3);
      }

      /* 3D Card Container */
      .cards {
        display: flex;
        flex-direction: column;
        gap: 18px;
        perspective: 1200px;
      }

      /* Real 3D Card */
      .card {
        position: relative;
        padding: 18px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
        color: #fff;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        font-weight: 500;
        transform-style: preserve-3d;
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(0, 255, 150, 0.4);
      }

      /* Inner Layer for Depth */
      .card span {
        transform: translateZ(40px);
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .card i {
        font-size: 20px;
      }

      .card:hover {
        box-shadow: 0 25px 50px rgba(0, 255, 150, 0.4);
      }

      /* Footer */
      .footer {
        margin-top: 25px;
        font-size: 12px;
        opacity: 0.6;
      }

      /* Responsive */
      @media (max-width: 480px) {
        .card span {
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Floating Bubbles -->
    <script>
      for (let i = 0; i < 25; i++) {
        let bubble = document.createElement("div");
        bubble.classList.add("bubble");
        let size = Math.random() * 50 + 10;
        bubble.style.width = size + "px";
        bubble.style.height = size + "px";
        bubble.style.left = Math.random() * 100 + "vw";
        bubble.style.animationDuration = 8 + Math.random() * 6 + "s";
        bubble.style.opacity = Math.random() * 2;
        document.body.appendChild(bubble);
      }
    </script>

    <div class="container">
      <!-- Profile -->
      <div class="profile-wrapper">

      </div>

      <h1>SURAJ PRAJAPATI</h1>
      <p class="bio">Aspiring Software Developer</p>

      <!-- 3D Social Cards -->
      <div class="cards">

            ><span><i class="fa-brands fa-github"></i>GitHub</span></a

        <a href="https://wa.me/8737003813"><i class="fa-brands fa-whatsapp"></i></a>

    <script>
      /* 3D Tilt Effect for Cards */
      const cards = document.querySelectorAll(".card");

      cards.forEach((card) => {
        card.addEventListener("mousemove", (e) => {
          const rect = card.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;

          const centerX = rect.width / 2;
          const centerY = rect.height / 2;

          const rotateX = -(y - centerY) / 6;
          const rotateY = (x - centerX) / 6;

          card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.05)`;
        });

        card.addEventListener("mouseleave", () => {
          card.style.transform = "rotateX(0) rotateY(0) scale(1)";
        });
      });
    </script>
  </body>
</html>
